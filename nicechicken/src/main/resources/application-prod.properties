spring.application.name=nicechicken
server.port=8080

server.forward-headers-strategy=framework

# Inside the Docker network, use the DB container name (nicechicken-db) instead of localhost.
spring.datasource.url=jdbc:postgresql://nicechicken-db:5432/nicechicken

# Set to 'update' for initial deployment to create DB tables (can be changed to 'none' for subsequent deployments).
spring.jpa.hibernate.ddl-auto=update

# Batch fetching: prevents N+1 queries on lazy-loaded collections
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Sensitive information should be injected via environment variables.
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Google OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# SMTP Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (used for Stripe redirect URLs)
app.frontend.url=

# File upload
app.upload.dir=/uploads/products
app.upload.base-url=
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
