version: '3.8'

services:
  nicechicken-db:
    image: postgres:15-alpine
    container_name: nicechicken-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: nicechicken
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - nicechicken-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nicechicken-network

  nicechicken-api:
    build: .
    container_name: nicechicken-api
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=86400000
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./uploads:/uploads
    depends_on:
      - nicechicken-db
    restart: unless-stopped
    networks:
      - nicechicken-network

networks:
  nicechicken-network:
    driver: bridge

volumes:
  nicechicken-db-data: